x-app-networked: &app-networked
  networks:
    - app-network

x-flink-image: &flink-image
  image: likh/kafka-flink-clickstream:${IMAGE_TAG:-latest}
  build:
    context: .
    dockerfile: Dockerfile

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 10

services:
  kafka:
    <<: *app-networked
    image: confluentinc/cp-kafka:7.5.3
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "cub", "kafka-ready", "-b", "kafka:29092", "1", "20"]
      start_period: 10s
    restart: unless-stopped

  kafka-init:
    <<: *app-networked
    image: confluentinc/cp-kafka:7.5.3
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_INIT_TOPICS: ${KAFKA_INIT_TOPICS:-clickstream.events:1,clickstream.metrics:1}
    command: >
      bash -c "
        set -e;
        IFS=',' read -ra TOPICS <<< \"$${KAFKA_INIT_TOPICS}\";
        for ITEM in \"$${TOPICS[@]}\"; do
          TOPIC=\"$${ITEM%%:*}\";
          PARTITIONS=\"$${ITEM##*:}\";
          echo \"Ensuring topic '$${TOPIC}' with $${PARTITIONS} partition(s)\";
          kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic \"$${TOPIC}\" --partitions \"$${PARTITIONS}\" --replication-factor 1;
        done
      "
    restart: "no"

  kafdrop:
    <<: *app-networked
    image: obsidiandynamics/kafdrop:4.2.0
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
    restart: unless-stopped

  flink-jobmanager:
    <<: [*app-networked, *flink-image]
    command: jobmanager
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/overview >/dev/null || exit 1"]
      start_period: 20s
    restart: unless-stopped

  flink-taskmanager:
    <<: [*app-networked, *flink-image]
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: ${FLINK_TASK_SLOTS:-2}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -fsS http://flink-jobmanager:8081/taskmanagers >/dev/null || exit 1"]
      start_period: 20s
    restart: unless-stopped

  clickstream-job:
    <<: [*app-networked, *flink-image]
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-clickstream-flink}
      CLICKSTREAM_TOPIC: ${CLICKSTREAM_TOPIC:-clickstream.events}
      METRICS_TOPIC: ${METRICS_TOPIC:-clickstream.metrics}
    command: >
      bash -c "flink run -d -m flink-jobmanager:8081 -py /opt/flink/usrlib/clickstream/clickstream_metrics.py"
    restart: "no"

volumes:
  kafka-data:

networks:
  app-network:
    driver: bridge
